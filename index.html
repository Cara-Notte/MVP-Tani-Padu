<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Tani Padu membantu petani Rajeg menjual hasil panen langsung kepada konsumen dan mendukung monitoring pangan."
    />
    <title>Tani Padu</title>
      <script>
        // Normalize legacy product image paths stored in localStorage
        try {
          const key = "tanipadu_products";
          const raw = window.localStorage.getItem(key);
          if (raw) {
            const parsed = JSON.parse(raw);
            if (Array.isArray(parsed)) {
              const normalized = parsed.map((p) => {
                if (p && typeof p.imageUrl === "string" && p.imageUrl.startsWith("/assets/")) {
                  return { ...p, imageUrl: `.${p.imageUrl}` };
                }
                return p;
              });
              window.localStorage.setItem(key, JSON.stringify(normalized));
            }
          }
        } catch (e) {
          /* ignore */
        }
      </script>
    <script type="module" src="/src/main.jsx"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
